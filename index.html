<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f07820" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ilitha" />
<title>Ilitha Vouchers</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0b08; --surface: #1a1208; --border: #3a2a14; --border2: #4d3a20;
    --text: #f5ede0; --muted: #8a7560;
    --accent: #f07820; --accent-dim: #2a1400; --accent-hover: #e06010;
    --sent-bg: #120e08; --sent-text: #3a3028;
    --danger: #ff5555; --danger-bg: #2a1010;
    --font-ui: 'Sora', sans-serif; --font-mono: 'DM Mono', monospace;
    --radius: 10px; --radius-lg: 16px;
    --r10: #4ea8de; --r10-dim: #0d1f2d;
    --r30: #f07820; --r30-dim: #2a1400;
    --r60: #c87af0; --r60-dim: #1e0f2e;
  }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; padding: 0 0 80px; }

  /* TOP BAR */
  .top-bar {
    position: sticky; top: 0; z-index: 10;
    background: #0f0b08ee; backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .brand-name { font-family: var(--font-mono); font-size: 16px; font-weight: 500; color: var(--accent); letter-spacing: 0.06em; }
  .brand-sub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.04em; margin-top: 1px; }

  /* FILTERS */
  .filter-section { padding: 12px 16px 0; }
  .filter-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 6px; }
  .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .pill {
    font-family: var(--font-mono); font-size: 11px; padding: 6px 4px; border-radius: var(--radius);
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; text-align: center; white-space: nowrap;
  }
  .pill:hover { border-color: var(--border2); color: var(--text); }
  .pill.active { font-weight: 500; }
  .pill.p-all.active   { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pill.p-sent.active  { background: #2a4a2a; color: #7fcf7f; border-color: #7fcf7f; }
  .pill.p-10.active    { background: var(--r10-dim); color: var(--r10); border-color: var(--r10); }
  .pill.p-30.active    { background: var(--r30-dim); color: var(--r30); border-color: var(--r30); }
  .pill.p-60.active    { background: var(--r60-dim); color: var(--r60); border-color: var(--r60); }
  .pill.p-u10.active   { background: var(--r10-dim); color: var(--r10); border-color: var(--r10); }
  .pill.p-u30.active   { background: var(--r30-dim); color: var(--r30); border-color: var(--r30); }
  .pill.p-u60.active   { background: var(--r60-dim); color: var(--r60); border-color: var(--r60); }
  .pill.p-unsent.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

  .filter-row-label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 0.06em; margin: 8px 0 4px; }

  /* SHARED BANNER */
  .shared-banner {
    display: none; margin: 12px 16px 0;
    background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: var(--radius-lg); padding: 14px 16px;
    font-family: var(--font-mono); font-size: 13px; color: var(--accent);
    animation: slideIn 0.3s ease;
  }
  .shared-banner .sb-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; }
  .shared-banner .sb-code { font-size: 15px; font-weight: 500; word-break: break-all; color: var(--text); margin-bottom: 10px; }
  .sb-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .sb-btn { font-family: var(--font-mono); font-size: 12px; padding: 6px 16px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: all 0.15s; }
  .sb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sb-btn.secondary { background: transparent; color: var(--muted); border-color: var(--border2); }

  /* ADD FORM */
  .add-section { padding: 12px 16px 0; }
  .add-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .add-card input, .add-card textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--font-ui); font-size: 14px;
    padding: 10px 14px; width: 100%; transition: border-color 0.15s; outline: none; resize: none; line-height: 1.5;
  }
  .add-card input::placeholder, .add-card textarea::placeholder { color: var(--muted); }
  .add-card input:focus, .add-card textarea:focus { border-color: var(--accent); }
  .add-card textarea { min-height: 72px; }
  .denom-row { display: flex; gap: 8px; }
  .denom-btn {
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    padding: 8px 0; border-radius: var(--radius); border: 1px solid var(--border2);
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; flex: 1;
  }
  .denom-btn.sel-10 { background: var(--r10-dim); border-color: var(--r10); color: var(--r10); }
  .denom-btn.sel-30 { background: var(--r30-dim); border-color: var(--r30); color: var(--r30); }
  .denom-btn.sel-60 { background: var(--r60-dim); border-color: var(--r60); color: var(--r60); }
  .dup-warn { display: none; background: #2a1400; border: 1px solid var(--accent); border-radius: var(--radius); padding: 10px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
  .form-bottom { display: flex; gap: 8px; align-items: flex-end; }
  .form-bottom textarea { flex: 1; }
  .btn-add { background: var(--accent); color: #fff; font-family: var(--font-mono); font-size: 13px; font-weight: 500; padding: 10px 18px; border: none; border-radius: var(--radius); cursor: pointer; white-space: nowrap; align-self: flex-end; transition: background 0.15s, transform 0.1s; }
  .btn-add:hover { background: var(--accent-hover); }
  .btn-add:active { transform: scale(0.97); }

  /* STATS */
  .stats-bar { display: flex; gap: 14px; padding: 12px 16px 0; flex-wrap: wrap; }
  .stat { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); }
  .stat.accent strong { color: var(--accent); }
  .stat.s10 strong { color: var(--r10); }
  .stat.s30 strong { color: var(--r30); }
  .stat.s60 strong { color: var(--r60); }

  /* EOD BUTTON */
  .eod-bar { padding: 12px 16px 0; }
  .btn-eod { width: 100%; font-family: var(--font-mono); font-size: 12px; padding: 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-eod:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* HISTORY MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: #0f0b08cc; backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-title { font-family: var(--font-mono); font-size: 14px; font-weight: 500; color: var(--accent); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .history-day { margin-bottom: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .history-day-title { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.04em; }
  .history-stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .history-stat { font-family: var(--font-mono); font-size: 13px; }
  .history-stat strong { font-size: 18px; }
  .h-10 { color: var(--r10); }
  .h-30 { color: var(--r30); }
  .h-60 { color: var(--r60); }
  .h-total { color: var(--text); }
  .no-history { font-family: var(--font-mono); font-size: 13px; color: var(--muted); text-align: center; padding: 24px 0; }
  .btn-eod-confirm { width: 100%; margin-top: 16px; font-family: var(--font-mono); font-size: 13px; font-weight: 500; padding: 12px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; cursor: pointer; transition: background 0.15s; }
  .btn-eod-confirm:hover { background: var(--accent-hover); }

  /* DENOM BADGE */
  .denom-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; border: 1px solid; letter-spacing: 0.04em; white-space: nowrap; }
  .badge-10 { color: var(--r10); border-color: var(--r10); background: var(--r10-dim); }
  .badge-30 { color: var(--r30); border-color: var(--r30); background: var(--r30-dim); }
  .badge-60 { color: var(--r60); border-color: var(--r60); background: var(--r60-dim); }
  .badge-none { color: var(--muted); border-color: var(--border); background: transparent; }

  /* LIST */
  .list { padding: 10px 16px 0; display: flex; flex-direction: column; gap: 10px; }
  .voucher-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 14px; display: flex; gap: 12px; align-items: flex-start; transition: border-color 0.2s, background 0.2s; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }
  .voucher-card.sent { background: var(--sent-bg); border-color: #1e1508; }
  .voucher-card.sent .denom-badge { opacity: 0.35; }
  .voucher-card.duplicate { border-color: var(--accent) !important; }

  .toggle-col { display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 1px; flex-shrink: 0; }
  .toggle { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
  .toggle:hover { border-color: var(--accent); color: var(--accent); }
  .voucher-card.sent .toggle { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .toggle-label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); text-align: center; letter-spacing: 0.04em; }
  .voucher-card.sent .toggle-label { color: var(--accent); }

  .v-body { flex: 1; min-width: 0; }
  .v-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .v-name { font-size: 13px; font-weight: 500; color: var(--muted); font-family: var(--font-mono); }
  .voucher-card.sent .v-name { color: var(--sent-text); }
  .v-text { font-size: 14px; color: var(--text); white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  .voucher-card.sent .v-text { color: var(--sent-text); text-decoration: line-through; text-decoration-color: #3a2a14; }
  .dup-tag { font-family: var(--font-mono); font-size: 10px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 20px; padding: 1px 8px; }

  .v-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .btn-copy, .btn-del { font-family: var(--font-mono); font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy.copied { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; display: none; }

  @media (max-width: 380px) {
    .filter-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <div class="brand-icon">🎟</div>
    <div>
      <div class="brand-name">ILITHA</div>
      <div class="brand-sub">voucher manager</div>
    </div>
  </div>
</div>

<!-- Shared voucher intake banner -->
<div class="shared-banner" id="shared-banner">
  <div class="sb-label">RECEIVED FROM 1VOUCHER</div>
  <div class="sb-code" id="shared-code"></div>
  <div class="sb-actions">
    <button class="sb-btn primary" onclick="acceptShared()">＋ Save to Ilitha</button>
    <button class="sb-btn secondary" onclick="dismissShared()">Dismiss</button>
  </div>
</div>

<!-- Filters -->
<div class="filter-section">
  <div class="filter-label">FILTER</div>
  <div class="filter-grid">
    <button class="pill p-all active"   onclick="setFilter('all',this)">All</button>
    <button class="pill p-unsent"       onclick="setFilter('unsent',this)">Unsent</button>
    <button class="pill p-sent"         onclick="setFilter('sent',this)">Sent</button>
    <button class="pill p-10"           onclick="setFilter('10',this)">R10</button>
    <button class="pill p-30"           onclick="setFilter('30',this)">R30</button>
    <button class="pill p-60"           onclick="setFilter('60',this)">R60</button>
    <button class="pill p-u10"          onclick="setFilter('unsent-10',this)">Unsent R10</button>
    <button class="pill p-u30"          onclick="setFilter('unsent-30',this)">Unsent R30</button>
    <button class="pill p-u60"          onclick="setFilter('unsent-60',this)">Unsent R60</button>
  </div>
</div>

<!-- Add form -->
<div class="add-section">
  <div class="add-card">
    <input type="text" id="inp-name" placeholder="Recipient name (optional)" maxlength="80" />
    <div class="denom-row">
      <button class="denom-btn" id="d10" onclick="selectDenom(10)">R10</button>
      <button class="denom-btn" id="d30" onclick="selectDenom(30)">R30</button>
      <button class="denom-btn" id="d60" onclick="selectDenom(60)">R60</button>
    </div>
    <div id="dup-warn" class="dup-warn">⚠ This voucher already exists in your list.</div>
    <div class="form-bottom">
      <textarea id="inp-text" placeholder="Paste or type your voucher here…" rows="3" oninput="checkDup()"></textarea>
      <button class="btn-add" onclick="addVoucher()">＋ Add</button>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat accent"><strong id="stat-unsent">0</strong> unsent</div>
  <div class="stat"><strong id="stat-sent">0</strong> sent</div>
  <div class="stat s10"><strong id="stat-u10">0</strong> unsent R10</div>
  <div class="stat s30"><strong id="stat-u30">0</strong> unsent R30</div>
  <div class="stat s60"><strong id="stat-u60">0</strong> unsent R60</div>
</div>

<!-- End of day button -->
<div class="eod-bar">
  <button class="btn-eod" onclick="openModal()">📊 End of day — save summary & reset</button>
</div>

<!-- History modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      <span>📊 Daily Summaries</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="history-list"></div>
    <button class="btn-eod-confirm" onclick="confirmEod()">✓ Save today & clear sent vouchers</button>
  </div>
</div>

<div class="list" id="list"></div>
<div class="empty" id="empty">No vouchers here yet.</div>

<script>
let vouchers = [];
let history = [];
let filter = 'all';
let selectedDenom = null;
let pendingShared = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/ilitha-vouchers/sw.js').catch(() => {});
}

// ── Share Target ────────────────────────────────────────────
function handleShareTarget() {
  const params = new URLSearchParams(window.location.search);
  const text = params.get('shared_text') || params.get('text') || '';
  const title = params.get('shared_title') || params.get('title') || '';
  const url = params.get('shared_url') || params.get('url') || '';
  const raw = (text || title || url).trim();
  if (!raw) return;
  const cleaned = raw.replace(/https?:\/\/\S+/g, '').trim() || raw.trim();
  pendingShared = cleaned;
  document.getElementById('shared-code').textContent = cleaned;
  document.getElementById('shared-banner').style.display = 'block';
  window.history.replaceState({}, '', window.location.pathname);
}
function acceptShared() {
  if (!pendingShared) return;
  document.getElementById('inp-text').value = pendingShared;
  checkDup(); dismissShared();
  document.getElementById('inp-text').scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('inp-name').focus();
}
function dismissShared() {
  document.getElementById('shared-banner').style.display = 'none';
  pendingShared = null;
}

// ── Storage ─────────────────────────────────────────────────
function load() {
  try { vouchers = JSON.parse(localStorage.getItem('ilitha_vouchers') || '[]'); } catch(e) { vouchers = []; }
  try { history = JSON.parse(localStorage.getItem('ilitha_history') || '[]'); } catch(e) { history = []; }
  render();
}
function save() {
  try { localStorage.setItem('ilitha_vouchers', JSON.stringify(vouchers)); } catch(e) {}
}
function saveHistory() {
  try { localStorage.setItem('ilitha_history', JSON.stringify(history)); } catch(e) {}
}

// ── Denom ───────────────────────────────────────────────────
function selectDenom(d) {
  selectedDenom = selectedDenom === d ? null : d;
  [10,30,60].forEach(x => {
    document.getElementById('d'+x).className = 'denom-btn' + (selectedDenom === x ? ' sel-'+x : '');
  });
}

// ── Filter ──────────────────────────────────────────────────
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Duplicate check ─────────────────────────────────────────
function normalize(s) { return s.trim().replace(/\s+/g,' ').toLowerCase(); }
function isDuplicate(text) {
  const n = normalize(text);
  return n.length > 0 && vouchers.some(v => normalize(v.text) === n);
}
function checkDup() {
  const text = document.getElementById('inp-text').value;
  document.getElementById('dup-warn').style.display = isDuplicate(text) ? 'block' : 'none';
}

// ── Add ─────────────────────────────────────────────────────
function addVoucher() {
  const name = document.getElementById('inp-name').value.trim();
  const text = document.getElementById('inp-text').value.trim();
  if (!text) { document.getElementById('inp-text').focus(); return; }
  if (isDuplicate(text) && !confirm('This voucher looks like a duplicate. Add it anyway?')) return;
  vouchers.unshift({ id: Date.now(), name, text, sent: false, denom: selectedDenom });
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-text').value = '';
  document.getElementById('dup-warn').style.display = 'none';
  save(); render();
}

// ── Toggle / Delete / Copy ──────────────────────────────────
function toggleSent(id) {
  const v = vouchers.find(v => v.id === id);
  if (v) { v.sent = !v.sent; save(); render(); }
}
function deleteVoucher(id) {
  if (!confirm('Delete this voucher?')) return;
  vouchers = vouchers.filter(v => v.id !== id);
  save(); render();
}
function copyVoucher(id) {
  const v = vouchers.find(v => v.id === id);
  if (!v) return;
  const toCopy = v.name ? v.name + '\n' + v.text : v.text;
  const btn = document.getElementById('cb-' + id);
  const done = () => {
    if (!btn) return;
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Copy for WhatsApp'; btn.classList.remove('copied'); }, 2000);
  };
  navigator.clipboard.writeText(toCopy).then(done).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = toCopy; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); done();
  });
}

// ── End of Day ───────────────────────────────────────────────
function openModal() {
  renderHistory();
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function confirmEod() {
  const sent = vouchers.filter(v => v.sent);
  if (sent.length === 0) { alert('No sent vouchers to save yet.'); return; }
  if (!confirm('This will save today\'s summary and remove all sent vouchers. Unsent vouchers stay. Continue?')) return;

  const today = new Date().toLocaleDateString('en-ZA', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
  const summary = {
    date: today,
    timestamp: Date.now(),
    total: sent.length,
    r10: sent.filter(v => v.denom === 10).length,
    r30: sent.filter(v => v.denom === 30).length,
    r60: sent.filter(v => v.denom === 60).length,
    untagged: sent.filter(v => !v.denom).length,
    unsent_r10: vouchers.filter(v => !v.sent && v.denom === 10).length,
    unsent_r30: vouchers.filter(v => !v.sent && v.denom === 30).length,
    unsent_r60: vouchers.filter(v => !v.sent && v.denom === 60).length,
  };
  history.unshift(summary);
  vouchers = vouchers.filter(v => !v.sent);
  save(); saveHistory();
  closeModal(); render();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<div class="no-history">No summaries saved yet.</div>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-day">
      <div class="history-day-title">${h.date}</div>
      <div class="history-stats" style="margin-bottom:8px;">
        <div class="history-stat h-total"><strong>${h.total}</strong> sent</div>
        <div class="history-stat h-10"><strong>${h.r10}</strong> × R10</div>
        <div class="history-stat h-30"><strong>${h.r30}</strong> × R30</div>
        <div class="history-stat h-60"><strong>${h.r60}</strong> × R60</div>
        ${h.untagged ? `<div class="history-stat" style="color:var(--muted)"><strong>${h.untagged}</strong> untagged</div>` : ''}
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:0.04em;">CARRIED OVER UNSENT</div>
      <div class="history-stats">
        <div class="history-stat h-10"><strong>${h.unsent_r10||0}</strong> R10</div>
        <div class="history-stat h-30"><strong>${h.unsent_r30||0}</strong> R30</div>
        <div class="history-stat h-60"><strong>${h.unsent_r60||0}</strong> R60</div>
      </div>
    </div>
  `).join('');
}

// ── Render ───────────────────────────────────────────────────
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function badgeHtml(denom) {
  if (!denom) return '<span class="denom-badge badge-none">no amt</span>';
  const cls = {10:'badge-10',30:'badge-30',60:'badge-60'}[denom]||'badge-none';
  return `<span class="denom-badge ${cls}">R${denom}</span>`;
}
function getDupIds() {
  const seen={}, dups=new Set();
  vouchers.forEach(v => {
    const n=normalize(v.text);
    if(seen[n]!==undefined){dups.add(seen[n]);dups.add(v.id);}
    else seen[n]=v.id;
  });
  return dups;
}

function render() {
  const list=document.getElementById('list');
  const empty=document.getElementById('empty');
  const dupIds=getDupIds();
  const unsent=vouchers.filter(v=>!v.sent).length;
  document.getElementById('stat-unsent').textContent=unsent;
  document.getElementById('stat-sent').textContent=vouchers.length-unsent;
  document.getElementById('stat-u10').textContent=vouchers.filter(v=>!v.sent&&v.denom===10).length;
  document.getElementById('stat-u30').textContent=vouchers.filter(v=>!v.sent&&v.denom===30).length;
  document.getElementById('stat-u60').textContent=vouchers.filter(v=>!v.sent&&v.denom===60).length;

  const filtered=vouchers.filter(v=>{
    if(filter==='sent')       return v.sent;
    if(filter==='unsent')     return !v.sent;
    if(filter==='10')         return v.denom===10;
    if(filter==='30')         return v.denom===30;
    if(filter==='60')         return v.denom===60;
    if(filter==='unsent-10')  return !v.sent && v.denom===10;
    if(filter==='unsent-30')  return !v.sent && v.denom===30;
    if(filter==='unsent-60')  return !v.sent && v.denom===60;
    return true;
  });

  if(!filtered.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=filtered.map(v=>`
    <div class="voucher-card ${v.sent?'sent':''} ${dupIds.has(v.id)?'duplicate':''}">
      <div class="toggle-col">
        <button class="toggle" onclick="toggleSent(${v.id})">${v.sent?'✓':'↗'}</button>
        <span class="toggle-label">${v.sent?'SENT':'UNSENT'}</span>
      </div>
      <div class="v-body">
        <div class="v-header">
          ${v.name?`<span class="v-name">→ ${esc(v.name)}</span>`:''}
          ${badgeHtml(v.denom)}
          ${dupIds.has(v.id)?'<span class="dup-tag">⚠ duplicate</span>':''}
        </div>
        <div class="v-text">${esc(v.text)}</div>
        <div class="v-actions">
          <button class="btn-copy" id="cb-${v.id}" onclick="copyVoucher(${v.id})">⎘ Copy for WhatsApp</button>
          <button class="btn-del" onclick="deleteVoucher(${v.id})">✕ Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('inp-text').addEventListener('keydown', e => {
  if(e.key==='Enter'&&e.ctrlKey) addVoucher();
});
document.getElementById('modal').addEventListener('click', e => {
  if(e.target===document.getElementById('modal')) closeModal();
});

load();
handleShareTarget();
</script>
</body>
